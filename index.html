<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Authorization Complete</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .success-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h2 { margin: 0 0 12px; color: #fff; }
    p { color: #aaa; margin: 8px 0; }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="success-icon" id="icon">&#9203;</div>
    <h2 id="title">Completing authorization...</h2>
    <p id="message">Please wait.</p>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var state = params.get('state');
      var error = params.get('error');

      if (error) {
        document.getElementById('icon').textContent = '\u274C';
        document.getElementById('title').textContent = 'Authorization Failed';
        document.getElementById('message').textContent = error;
        document.getElementById('message').className = 'error';
        return;
      }

      if (!code) {
        document.getElementById('icon').textContent = '\u274C';
        document.getElementById('title').textContent = 'No Authorization Code';
        document.getElementById('message').textContent = 'Missing code parameter.';
        document.getElementById('message').className = 'error';
        return;
      }

      // Send the code back to the sidebar via postMessage
      var sent = false;
      if (window.opener) {
        try {
          window.opener.postMessage({ type: 'oauth_callback', code: code, state: state }, '*');
          sent = true;
        } catch (e) {}
      }

      if (sent) {
        document.getElementById('icon').textContent = '\u2705';
        document.getElementById('title').textContent = 'Connected!';
        document.getElementById('message').textContent = 'You can close this window and return to Google Sheets.';
        setTimeout(function() { window.close(); }, 2000);
      } else {
        // Fallback: redirect to Apps Script web app to exchange code server-side
        // The web app URL is encoded in the state parameter
        try {
          var stateData = JSON.parse(atob(state.replace(/-/g, '+').replace(/_/g, '/')));
          if (stateData.webAppUrl) {
            document.getElementById('title').textContent = 'Completing authorization...';
            document.getElementById('message').textContent = 'Redirecting...';
            window.location.href = stateData.webAppUrl + '?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state);
            return;
          }
        } catch (e) {}

        // Final fallback: show the code for manual copy
        document.getElementById('icon').textContent = '\u2705';
        document.getElementById('title').textContent = 'Authorization Successful';
        document.getElementById('message').innerHTML =
          'Copy this code and paste it in the sidebar:<br><br>' +
          '<input type="text" value="' + code + '" readonly onclick="this.select()" ' +
          'style="width:100%;padding:8px;font-size:12px;background:#1a1a2e;color:#fff;border:1px solid #444;border-radius:4px;">';
      }
    })();
  </script>
</body>
</html>
